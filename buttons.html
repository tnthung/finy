<template finy id="primary-button" label:str="Primary">
  <button type="button">
    <style>
      @scope {
        :scope {
          border: 0;
          border-radius: 8px;
          padding: 12px 20px;
          background: #2563eb;
          color: #ffffff;
          font-size: 15px;
          font-weight: 700;
          cursor: pointer;
          box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
        }
      }
    </style>
    $label
  </button>
</template>

<template finy id="outline-button" label:str="Outline">
  <button type="button">
    <style>
      @scope {
        :scope {
          border: 2px solid #111827;
          border-radius: 8px;
          padding: 10px 18px;
          background: transparent;
          color: #111827;
          font-size: 15px;
          font-weight: 700;
          cursor: pointer;
        }
      }
    </style>
    $label
  </button>
</template>

<template finy id="accent-button" label:str="Accent">
  <button type="button">
    <style>
      @scope {
        :scope {
          border: 1px solid #fed7aa;
          border-radius: 999px;
          padding: 12px 22px;
          background: #fff7ed;
          color: #c2410c;
          font-size: 15px;
          font-weight: 700;
          cursor: pointer;
          box-shadow: inset 0 1px 0 #ffffff, 0 4px 10px rgba(194, 65, 12, 0.12);
        }
      }
    </style>
    $label
  </button>
</template>
